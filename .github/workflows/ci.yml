name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Validate package.json files
        run: |
          echo "Validating package.json files..."
          for f in package.json shared/package.json backend/package.json frontend/package.json; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
                && echo "  ✓ $f" \
                || { echo "  ✗ $f is invalid JSON"; exit 1; }
            fi
          done
      - name: Install dependencies
        run: npm install --no-audit
      - name: Build shared package
        run: npm run build --workspace=shared
      - name: Build backend (TypeScript check)
        run: npm run build --workspace=backend
      - name: TypeScript check frontend
        run: npx tsc --noEmit --project frontend/tsconfig.json
      - name: Build frontend
        run: npm run build --workspace=frontend
      - name: Run backend tests
        run: npm test --workspace=backend
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-at-least-32-chars-long-here
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long-xx
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-test-service-key
          SUPABASE_ANON_KEY: ci-test-anon-key
          GROQ_API_KEY: ci-test-groq-key
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: ci-test-razorpay-secret
          RAZORPAY_WEBHOOK_SECRET: ci-test-webhook-secret
          REPORT_SECRET: test-report-secret-32-chars-here-x
          FRONTEND_URL: http://localhost:3000
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Validate package.json files
        run: |
          for f in package.json shared/package.json backend/package.json frontend/package.json; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
                && echo "  ✓ $f" \
                || { echo "  ✗ $f is invalid JSON"; exit 1; }
            fi
          done
      - name: Install dependencies
        run: npm install --no-audit
      - name: Backend npm audit
        run: npm audit --audit-level=high --workspace=backend
      - name: Frontend npm audit
        run: npm audit --omit=dev --audit-level=critical --workspace=frontend
        continue-on-error: true