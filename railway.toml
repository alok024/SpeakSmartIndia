# ─────────────────────────────────────────────────────────────
# Vachix Monorepo — Railway Config
# Place this file at the repo ROOT (alongside package.json,
# shared/, backend/, frontend/).
#
# Railway UI: set Root Directory to blank (repo root) for ALL
# services. These blocks handle everything else automatically.
# ─────────────────────────────────────────────────────────────

# ── Backend API ──────────────────────────────────────────────
# Matches the Railway service named "backend" (or "Vachix" —
# rename your service to "backend" in Railway for clean matching)
[[services]]
name = "backend"

[services.build]
# 1. Install all workspace deps from repo root (resolves @vachix/shared)
# 2. Build shared first (generates dist/ types)
# 3. Build backend
buildCommand = "npm install && npm run build --workspace=shared && npm run build --workspace=backend"

[services.deploy]
startCommand = "node backend/dist/app.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

# ── Background Worker ─────────────────────────────────────────
# Same build as backend, different start command.
# Add a separate Railway service named "worker" if you need it.
[[services]]
name = "worker"

[services.build]
buildCommand = "npm install && npm run build --workspace=shared && npm run build --workspace=backend"

[services.deploy]
startCommand = "node backend/dist/worker.js"

# ── Frontend (Next.js) ────────────────────────────────────────
[[services]]
name = "frontend"

[services.build]
buildCommand = "npm install && npm run build --workspace=shared && npm run build --workspace=frontend"

[services.deploy]
startCommand = "node frontend/.next/standalone/server.js"
